<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle for favicon shape -->
  <rect width="100" height="100" rx="20" fill="#0A0A0F"/>
  <!-- Hourglass top triangle (inverted) -->
  <polygon points="50,8 20,42 80,42" fill="white"/>
  <!-- Hourglass bottom triangle -->
  <polygon points="50,92 20,58 80,58" fill="white"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="6" fill="white"/>
  <!-- Cutout effect for waist -->
  <rect x="20" y="42" width="60" height="16" fill="#0A0A0F"/>
  <circle cx="50" cy="50" r="7" fill="white"/>
</svg>
